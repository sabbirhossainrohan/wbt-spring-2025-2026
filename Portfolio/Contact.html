<!DOCTYPE html>
<html>
<head>
    <title>  Contact Info </title>
</head>
<body>
  <nav>
    <a href="Index.html">Home</a> |
    <a href="Education.html">Education</a> |
    <a href="Exprience.html">Experience</a> |
    <a href="Projects.html">Projects</a>
</nav>

<hr>

<form method="post">
    <fieldset>
        <legend>Contact Me Form</legend>

        <table>

            <tr>
                <td><label for="fname">First Name:</label></td>
                <td><input type="text" id="fname" placeholder="Enter your name" name="fname" required></td>
            </tr>

            <tr>
                <td><label for="lname">Last Name:</label></td>
                <td><input type="text" id="lname" placeholder="Enter your name" name="lname" required></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="female"> Female
                </td>
            </tr>

            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" placeholder="Enter your email" name="email" required></td>
            </tr>

            <tr>
                <td><label for="company">Company:</label></td>
                <td><input type="text" id="company" placeholder="Enter your Company Name" name="company" required></td>
            </tr>

            <tr>
                <td>Reason for Contact:</td>
                <td>
                    <input type="checkbox" id="project" name="reason" value="project">
                    <label for="project">Project</label>

                    <input type="checkbox" id="thesis" name="reason" value="thesis">
                    <label for="thesis">Thesis</label>

                    <input type="checkbox" id="job" name="reason" value="job">
                    <label for="job">Job</label>
                </td>
            </tr>

            <tr>
                <td>Topics of Interest:</td>
                <td>
                    <input type="checkbox" id="web" name="topics" value="web development">
                    <label for="web">Web Development</label>

                    <input type="checkbox" id="mobile" name="topics" value="mobile development">
                    <label for="mobile">Mobile Development</label>

                    <input type="checkbox" id="ai" name="topics" value="ai/ml development">
                    <label for="ai">AI/ML Development</label>
                </td>
            </tr>

            <tr>
                <td><label for="date">Consultation Date:</label></td>
                <td><input type="date" id="date" name="date" required></td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>

    </fieldset>
</form>



</body>
</html>


</body>
