<!DOCTYPE html>
<html>
<head>
<title>Donor Information</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Donor Information</h2>

<form>

<table>

<tr>
<td class="label">First Name <span class="star">*</span></td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Last Name <span class="star">*</span></td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Company</td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Address 1 <span class="star">*</span></td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Address 2</td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">City <span class="star">*</span></td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">State <span class="star">*</span></td>
<td>
<select>
<option>Select a State</option>
<option>Dhaka</option>
<option>Khulna</option>
<option>Chittagong</option>
</select>
</td>
</tr>

<tr>
<td class="label">Zip Code <span class="star">*</span></td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Country <span class="star">*</span></td>
<td>
<select>
<option>Select a Country</option>
<option>Bangladesh</option>
<option>India</option>
<option>Pakistan</option>
</select>
</td>
</tr>

<tr>
<td class="label">Phone</td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Fax</td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Email <span class="star">*</span></td>
<td><input type="email"></td>
</tr>

<tr>
<td class="label">Donation Amount <span class="star">*</span></td>
<td>
<input type="radio" name="donation"> None
<input type="radio" name="donation"> $50
<input type="radio" name="donation"> $75
<input type="radio" name="donation"> $100
<input type="radio" name="donation"> $250
<input type="radio" name="donation"> Other
</td>
</tr>

<tr>
<td class="label">Other Amount $</td>
<td><input type="text"></td>
</tr>

<tr>
<td class="label">Recurring Donation</td>
<td>
<input type="checkbox"> I am interested in giving on a regular basis
</td>
</tr>

<tr>
<td class="label">Monthly Credit Card$</td>
<td class="monthly">
 <input type="text" class="small">
For
<input type="text" class="small">
Months
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
